<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>飯盛山歴史アドベンチャー | コース案内</title>
  <style>
    :root{
      --bg: #f7f4ee;
      --card: #ffffff;
      --text: #2f2a24;
      --sub: #6b6257;
      --accent: #8b5e3c;
      --accent-2: #d9b38c;
      --line: #e7dfd3;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 18px;
      --maxw: 960px;
      --stamp-bg: #fff7d6;
      --stamp-border: #e7c96b;
      --stamp-text: #7a5a00;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      background: linear-gradient(180deg, #f8f5ef 0%, #f2ede3 100%);
      color: var(--text);
      line-height: 1.75;
    }

    .wrap{
      width: min(100% - 24px, var(--maxw));
      margin: 0 auto;
      padding: 16px 0 48px;
    }

    .topbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:16px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:46px;
      padding:10px 16px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      box-shadow: var(--shadow);
      transition: transform .15s ease;
      cursor:pointer;
    }

    .btn:hover{ transform: translateY(-1px); }

    .btn-primary{
      background: var(--accent);
      color:#fff;
      border-color: var(--accent);
    }

    .btn-secondary{
      background:#f8f3eb;
      color:#6a513d;
    }

    .hero{
      background: var(--card);
      border:1px solid var(--line);
      border-radius: 24px;
      overflow:hidden;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .hero-image{
      width:100%;
      aspect-ratio:16 / 9;
      background:
        linear-gradient(rgba(80,60,40,.25), rgba(80,60,40,.25)),
        url("assets/img/hero-iimoriyama-kazuma.jpg") center center / cover no-repeat;
    }

    .hero-body{
      padding: 20px;
    }

    .eyebrow{
      display:inline-block;
      margin-bottom:10px;
      padding:6px 12px;
      border-radius:999px;
      background:#f3ece2;
      color:#7a5a42;
      font-size:.92rem;
      font-weight:700;
    }

    h1{
      margin:0 0 10px;
      font-size: clamp(1.9rem, 4vw, 2.6rem);
      line-height:1.35;
    }

    .lead{
      margin:0;
      color: var(--sub);
      font-size:1.05rem;
    }

    .info-grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:14px;
      margin:18px 0;
    }

    @media (max-width: 720px){
      .info-grid{
        grid-template-columns: 1fr;
      }
    }

    .info-card{
      background: var(--card);
      border:1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .info-label{
      font-size:.9rem;
      color:#7a6e62;
      font-weight:700;
      margin-bottom:4px;
    }

    .info-value{
      font-size:1.1rem;
      font-weight:700;
    }

    .stamp-bar{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:10px;
      margin:16px 0 20px;
      padding:14px 16px;
      border-radius:16px;
      background: var(--stamp-bg);
      border:1px solid var(--stamp-border);
      color: var(--stamp-text);
      box-shadow: var(--shadow);
    }

    .section-title{
      margin: 24px 0 12px;
      font-size:1.35rem;
    }

    .spots{
      display:grid;
      gap:16px;
    }

    .spot-card{
      background: var(--card);
      border:1px solid var(--line);
      border-radius: 20px;
      overflow:hidden;
      box-shadow: var(--shadow);
    }

    .spot-image{
      width:100%;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, #dcc5a7 0%, #f3ebe0 100%);
      background-size: cover;
      background-position: center;
    }

    .spot-body{
      padding:18px;
    }

    .spot-order{
      display:inline-block;
      margin-bottom:8px;
      padding:5px 10px;
      border-radius:999px;
      background:#efe5d7;
      color:#6d533f;
      font-size:.9rem;
      font-weight:700;
    }

    .spot-title{
      margin:0 0 8px;
      font-size:1.3rem;
      line-height:1.4;
    }

    .spot-short{
      margin:0 0 10px;
      color:var(--sub);
    }

    .spot-meta{
      display:grid;
      gap:6px;
      margin: 0 0 14px;
      color:#5b5148;
      font-size:.97rem;
    }

    .spot-actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .done-badge{
      display:inline-block;
      margin-left:8px;
      padding:5px 10px;
      border-radius:999px;
      background:#e8f6e8;
      color:#2f6a32;
      border:1px solid #b7e0b9;
      font-size:.86rem;
      font-weight:700;
      vertical-align:middle;
    }

    .error-box{
      background:#fff;
      border:1px solid #f0d4d4;
      color:#7a2f2f;
      border-radius:20px;
      padding:24px;
      box-shadow: var(--shadow);
    }

    .footer-nav{
      margin-top:22px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .hidden{
      display:none !important;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="btn" href="index.html">← トップへ戻る</a>
      <a class="btn" href="complete.html">達成画面を見る</a>
    </div>

    <main id="app">
      <section class="hero">
        <div class="hero-image"></div>
        <div class="hero-body">
          <div class="eyebrow">飯盛山歴史アドベンチャー</div>
          <h1 id="courseTitle">コース案内</h1>
          <p id="courseLead" class="lead">歴史を感じながら、飯盛山のスポットをめぐる体験型コースです。</p>
        </div>
      </section>

      <section class="info-grid">
        <div class="info-card">
          <div class="info-label">スポット数</div>
          <div id="spotCount" class="info-value">-</div>
        </div>
        <div class="info-card">
          <div class="info-label">所要時間</div>
          <div id="courseTime" class="info-value">約60分</div>
        </div>
        <div class="info-card">
          <div class="info-label">対象</div>
          <div id="courseTarget" class="info-value">ご家族・一般向け</div>
        </div>
      </section>

      <section class="stamp-bar">
        <strong id="stampProgress">冒険スタンプ 0/0</strong>
        <button class="btn btn-secondary" onclick="resetAdventure()">スタンプをリセット</button>
      </section>

      <section id="errorView" class="error-box hidden">
        <h2>コースデータを読み込めませんでした</h2>
        <p id="errorMessage">data/course-single.json の内容をご確認ください。</p>
      </section>

      <section id="courseView">
        <h2 class="section-title">スポット一覧</h2>
        <div id="spotsList" class="spots"></div>

        <div class="footer-nav">
          <a class="btn" href="index.html">← トップへ戻る</a>
          <a class="btn btn-primary" href="complete.html">達成画面へ →</a>
        </div>
      </section>
    </main>
  </div>

  <script>
    const DATA_URL = "data/course-single.json";
    const STORAGE_KEY = "iimoriyama_stamps";

    function qs(id){
      return document.getElementById(id);
    }

    function escapeHtml(str = ""){
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getAllSpots(data){
      if (Array.isArray(data)) return data;
      if (Array.isArray(data.spots)) return data.spots;
      if (data.course && Array.isArray(data.course.spots)) return data.course.spots;
      if (data.data && Array.isArray(data.data.spots)) return data.data.spots;
      return [];
    }

    function getCourseTitle(data){
      return data.course_name || data.title || data.name || "飯盛山歴史アドベンチャー";
    }

    function getCourseLead(data){
      return data.description || data.lead || data.summary ||
        "歴史を感じながら、飯盛山のスポットをめぐる体験型コースです。";
    }

    function getCourseTime(data){
      return data.required_time || data.duration || data.time || "約60分";
    }

    function getCourseTarget(data){
      return data.target || "ご家族・一般向け";
    }

    function getSpotText(spot){
      return spot.short_text || spot.summary || spot.description || "歴史を感じるスポットです。";
    }

 
    function getSpotImage(spot){

    const name = spot.image || spot.image_url || spot.photo || "";

    if(!name) return "";

    const file = name.split("/").pop();

    return "assets/img/" + file;

    }


    function getSpotAddress(spot){
      return (
        spot.address ||
        spot.location?.address ||
        spot.place ||
        "情報準備中"
      );
    }

    function getStampIds(){
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    }

    function resetAdventure(){
      localStorage.removeItem(STORAGE_KEY);
      alert("スタンプをリセットしました");
      location.reload();
    }

    function updateStampProgress(total){

      const count = getStampIds().length;

      let stars = "";

      for(let i=0;i<total;i++){
        if(i < count){
          stars += "★";
        }else{
          stars += "☆";
        }
      }

      qs("stampProgress").innerHTML =
        `<div style="font-size:28px;color:#f5b301;letter-spacing:4px">${stars}</div>
        <div>スタンプ ${count}/${total}</div>`;
      }

    function showError(message){
      qs("errorMessage").textContent = message;
      qs("errorView").classList.remove("hidden");
      qs("courseView").classList.add("hidden");
    }

    function renderSpots(spots){
      const doneIds = getStampIds();
      const html = spots.map((spot, index) => {
        const image = getSpotImage(spot);
        const imageStyle = image
          ? `style="background-image:url('${escapeHtml(image)}')"`
          : "";

        const isDone = doneIds.includes(spot.id);
        const doneBadge = isDone ? `<span class="done-badge">達成済み</span>` : "";

        return `
          <article class="spot-card">
            <div class="spot-image" ${imageStyle}></div>
            <div class="spot-body">
              <div class="spot-order">スポット ${index + 1}</div>
              <h3 class="spot-title">
                ${escapeHtml(spot.name || spot.title || "名称未設定")}
                ${doneBadge}
              </h3>
              <p class="spot-short">${escapeHtml(getSpotText(spot))}</p>
              <div class="spot-meta">
                <div><strong>ID:</strong> ${escapeHtml(spot.id || "-")}</div>
                <div><strong>住所:</strong> ${escapeHtml(getSpotAddress(spot))}</div>
              </div>
              <div class="spot-actions">
                <a class="btn btn-primary" href="spot.html?id=${encodeURIComponent(spot.id)}">スポットを見る →</a>
                <a class="btn btn-secondary" href="spot.html?id=${encodeURIComponent(spot.id)}">QR想定画面を見る</a>
              </div>
            </div>
          </article>
        `;
      }).join("");

      qs("spotsList").innerHTML = html;
    }

    async function init(){
      try{
        const res = await fetch(DATA_URL, { cache: "no-store" });
        if (!res.ok) {
          throw new Error(`JSONの読み込みに失敗しました (${res.status})`);
        }

        const data = await res.json();
        const spots = getAllSpots(data);

        if (!spots.length) {
          showError("course-single.json からスポット一覧を取得できませんでした。JSON構造をご確認ください。");
          return;
        }

        qs("courseTitle").textContent = getCourseTitle(data);
        qs("courseLead").textContent = getCourseLead(data);
        qs("spotCount").textContent = `${spots.length}か所`;
        qs("courseTime").textContent = getCourseTime(data);
        qs("courseTarget").textContent = getCourseTarget(data);

        renderSpots(spots);
        updateStampProgress(spots.length);

        document.title = `${getCourseTitle(data)} | コース案内`;
      } catch(err){
        console.error(err);
        showError(`読み込みエラー: ${err.message}`);
      }
    }

    init();
  </script>
</body>
</html>
