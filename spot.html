<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>飯盛山歴史アドベンチャー | スポット</title>
  <style>
    :root{
      --bg: #f7f4ee;
      --card: #ffffff;
      --text: #2f2a24;
      --sub: #6b6257;
      --accent: #8b5e3c;
      --accent-2: #d9b38c;
      --line: #e7dfd3;
      --stamp-bg: #fff7d6;
      --stamp-border: #e7c96b;
      --stamp-text: #7a5a00;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 18px;
      --maxw: 920px;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      background: linear-gradient(180deg, #f8f5ef 0%, #f2ede3 100%);
      color: var(--text);
      line-height: 1.75;
    }

    .wrap{
      width: min(100% - 24px, var(--maxw));
      margin: 0 auto;
      padding: 16px 0 48px;
    }

    .topbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:16px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height: 46px;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration:none;
      font-weight:700;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      box-shadow: var(--shadow);
      transition: transform .15s ease, opacity .15s ease;
    }

    .btn:hover{ transform: translateY(-1px); }
    .btn:active{ transform: translateY(0); }

    .btn-primary{
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .hero{
      background: var(--card);
      border:1px solid var(--line);
      border-radius: 24px;
      overflow:hidden;
      box-shadow: var(--shadow);
    }

    .hero-image{
      width:100%;
      aspect-ratio: 16 / 9;
      background: #ddd center center / cover no-repeat;
    }

    .hero-body{
      padding: 20px;
    }

    .eyebrow{
      display:inline-block;
      margin-bottom: 10px;
      padding: 6px 12px;
      border-radius: 999px;
      background:#f3ece2;
      color:#7a5a42;
      font-size: 0.92rem;
      font-weight:700;
    }

    h1{
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      line-height:1.35;
    }

    .lead{
      margin:0;
      color: var(--sub);
      font-size: 1.05rem;
    }

    .stamp-status{
      display:inline-block;
      margin: 16px 0 0;
      padding: 8px 14px;
      border-radius:999px;
      background: var(--stamp-bg);
      border:1px solid var(--stamp-border);
      color: var(--stamp-text);
      font-weight:700;
    }

    .grid{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 18px;
      margin-top: 18px;
    }

    @media (max-width: 820px){
      .grid{
        grid-template-columns: 1fr;
      }
    }

    .card{
      background: var(--card);
      border:1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .card h2{
      margin:0 0 12px;
      font-size:1.25rem;
      line-height:1.4;
    }

    .meta-list{
      display:grid;
      gap:10px;
      margin:0;
    }

    .meta-item{
      display:grid;
      grid-template-columns: 96px 1fr;
      gap:10px;
      padding: 10px 0;
      border-bottom:1px dashed var(--line);
    }

    .meta-item:last-child{
      border-bottom:none;
      padding-bottom:0;
    }

    .meta-label{
      font-weight:700;
      color:#6f604f;
    }

    .meta-value{
      color:var(--text);
      word-break: break-word;
    }

    .narration{
      font-size: 1.05rem;
    }

    .note{
      margin-top:14px;
      padding:14px 16px;
      border-radius:14px;
      background:#fcf8f1;
      border:1px solid #eee2d2;
      color:#5f5347;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
    }

    .footer-nav{
      margin-top: 22px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .error-box{
      background:#fff;
      border:1px solid #f0d4d4;
      color:#7a2f2f;
      border-radius:20px;
      padding:24px;
      box-shadow: var(--shadow);
    }

    .small{
      font-size:.95rem;
      color:var(--sub);
    }

    .hidden{
      display:none !important;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="btn" href="index.html">← トップへ戻る</a>
      <a class="btn" href="course.html">冒険コースを見る</a>
    </div>

    <main id="app">
      <section id="errorView" class="error-box hidden">
        <h1>該当スポットが見つかりません</h1>
        <p id="errorMessage">
          URLの指定、またはJSONのidが一致していない可能性があります。
        </p>
        <div class="footer-nav">
          <a class="btn" href="course.html">コースへ戻る</a>
          <a class="btn btn-primary" href="index.html">トップへ戻る</a>
        </div>
      </section>

      <section id="spotView" class="hidden">
        <article class="hero">
          <div id="heroImage" class="hero-image"></div>
          <div class="hero-body">
            <div class="eyebrow">飯盛山歴史アドベンチャー</div>
            <h1 id="spotName">スポット名</h1>
            <p id="spotShort" class="lead">スポット概要</p>
            <div id="stampStatus" class="stamp-status">冒険スタンプ 0/5</div>
          </div>
        </article>

        <div class="grid">
          <section class="card">
            <h2>スポット紹介</h2>
            <div id="spotDescription" class="narration">
              説明文が入ります。
            </div>

            <div id="guideNote" class="note hidden"></div>

            <div class="actions">
              <a id="googleMapBtn" class="btn hidden" target="_blank" rel="noopener noreferrer">Googleマップで見る</a>
              <a id="nextSpotBtn" class="btn btn-primary hidden">次のスポットへ →</a>
            </div>
          </section>

          <aside class="card">
            <h2>スポット情報</h2>
            <div class="meta-list">
              <div class="meta-item">
                <div class="meta-label">名称</div>
                <div id="metaName" class="meta-value">-</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">住所</div>
                <div id="metaAddress" class="meta-value">-</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">緯度経度</div>
                <div id="metaLatLng" class="meta-value">-</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">ひとこと</div>
                <div id="metaShort" class="meta-value">-</div>
              </div>
            </div>

            <div class="footer-nav">
              <a class="btn" href="course.html">← コースへ戻る</a>
              <a class="btn" href="complete.html">達成画面を見る</a>
            </div>
          </aside>
        </div>
      </section>
    </main>
  </div>

  <script>
    const DATA_URL = "data/course-single.json";
    const STORAGE_KEY = "iimoriyama_stamps";

    function qs(id){
      return document.getElementById(id);
    }

    function escapeHtml(str = ""){
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function nl2br(str = ""){
      return escapeHtml(str).replace(/\n/g, "<br>");
    }

    function getQuerySpotId(){
      const params = new URLSearchParams(location.search);
      return params.get("id") || params.get("spot") || "";
    }

    function getAllSpots(data){
      if (Array.isArray(data)) return data;
      if (Array.isArray(data.spots)) return data.spots;
      if (data.course && Array.isArray(data.course.spots)) return data.course.spots;
      if (data.data && Array.isArray(data.data.spots)) return data.data.spots;
      return [];
    }

    function getCourseTitle(data){
      return data.course_name || data.title || data.name || "飯盛山歴史アドベンチャー";
    }

    function getSpotText(spot){
      return (
        spot.description ||
        spot.long_text ||
        spot.body ||
        spot.text ||
        spot.content ||
        "このスポットの説明文は、これから追加されます。"
      );
    }

    function getSpotImage(spot){
      return (
        spot.image ||
        spot.image_url ||
        spot.photo ||
        spot.thumbnail ||
        spot.hero_image ||
        ""
      );
    }

    function getSpotAddress(spot){
      return (
        spot.address ||
        spot.location?.address ||
        spot.place ||
        "情報準備中"
      );
    }

    function getSpotLat(spot){
      return (
        spot.lat ??
        spot.latitude ??
        spot.location?.lat ??
        spot.location?.latitude ??
        ""
      );
    }

    function getSpotLng(spot){
      return (
        spot.lng ??
        spot.lon ??
        spot.longitude ??
        spot.location?.lng ??
        spot.location?.lon ??
        spot.location?.longitude ??
        ""
      );
    }

    function getGuideNote(spot){
      return (
        spot.guide_note ||
        spot.kazuma_message ||
        spot.message ||
        ""
      );
    }

    function saveStamp(spotId){
      if (!spotId) return 0;
      const stamps = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      if (!stamps.includes(spotId)) {
        stamps.push(spotId);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(stamps));
      }
      return stamps.length;
    }

    function showStampEffect() {
      const div = document.createElement("div");

      div.textContent = "🎉 スタンプ獲得！";
      div.style.position = "fixed";
      div.style.top = "50%";
      div.style.left = "50%";
      div.style.transform = "translate(-50%, -50%)";
      div.style.padding = "16px 24px";
      div.style.borderRadius = "12px";
      div.style.background = "#fff3b0";
      div.style.color = "#5a4200";
      div.style.border = "2px solid #e6c75a";
      div.style.fontSize = "24px";
      div.style.fontWeight = "700";
      div.style.boxShadow = "0 8px 24px rgba(0,0,0,0.18)";
      div.style.zIndex = "9999";
      div.style.opacity = "0";
      div.style.transition = "opacity 0.2s ease";

      document.body.appendChild(div);

      requestAnimationFrame(() => {
        div.style.opacity = "1";
      });

      setTimeout(() => {
        div.style.opacity = "0";
        setTimeout(() => div.remove(), 250);
      }, 1400);
    }



    function getStampCount(){
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]").length;
    }

    function buildMapUrl(lat, lng, address){
      if (lat !== "" && lng !== "") {
        return `https://www.google.com/maps?q=${encodeURIComponent(lat + "," + lng)}`;
      }
      if (address) {
        return `https://www.google.com/maps?q=${encodeURIComponent(address)}`;
      }
      return "";
    }

    function showError(message){
      qs("errorMessage").textContent = message;
      qs("errorView").classList.remove("hidden");
      qs("spotView").classList.add("hidden");
    }

    function saveStamp(spotId){
    if (!spotId) return 0;

    const stamps = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

    if (!stamps.includes(spotId)) {
      stamps.push(spotId);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(stamps));
    }

    return stamps.length;
    }


    function showSpot(data, spots, spotId){
      const spot = spots.find(s => s.id === spotId);

      if (!spot) {
        showError(`指定されたスポット id「${spotId}」が course-single.json に見つかりません。`);
        return;
      }

      const totalSpots = spots.length || 5;

      const before = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]").length;

      const stampCount = saveStamp(spot.id);

      const after = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]").length;

      if (after > before) {
        showStampEffect();
      }

      console.log(spot);

      const name = spot.name || spot.title || "名称未設定";
      const shortText = spot.short_text || spot.summary || "歴史を感じるスポットです.";
      
      
      const description = getSpotText(spot);
      const image = getSpotImage(spot);
      const address = getSpotAddress(spot);
      const lat = getSpotLat(spot);
      const lng = getSpotLng(spot);
      const guideNote = getGuideNote(spot);

      qs("spotName").textContent = name;
      qs("spotShort").textContent = shortText;
      qs("metaName").textContent = name;
      qs("metaAddress").textContent = address;
      qs("metaShort").textContent = shortText;
      qs("spotDescription").innerHTML = nl2br(description);
      qs("stampStatus").textContent = `冒険スタンプ ${stampCount}/${totalSpots}`;

      if (lat !== "" && lng !== "") {
        qs("metaLatLng").textContent = `${lat}, ${lng}`;
      } else {
        qs("metaLatLng").textContent = "情報準備中";
      }

      if (image) {
        qs("heroImage").style.backgroundImage = `url("${image}")`;
      } else {
        qs("heroImage").style.backgroundImage =
          'linear-gradient(135deg, #d9c3a5 0%, #f3ebe0 100%)';
      }

      if (guideNote) {
        qs("guideNote").textContent = guideNote;
        qs("guideNote").classList.remove("hidden");
      }

      const mapUrl = buildMapUrl(lat, lng, address);
      if (mapUrl) {
        const mapBtn = qs("googleMapBtn");
        mapBtn.href = mapUrl;
        mapBtn.classList.remove("hidden");
      }

      const currentIndex = spots.findIndex(s => s.id === spot.id);
      const nextSpot = currentIndex >= 0 ? spots[currentIndex + 1] : null;
      if (nextSpot) {
        const nextBtn = qs("nextSpotBtn");
        nextBtn.href = `spot.html?id=${encodeURIComponent(nextSpot.id)}`;
        nextBtn.textContent = `次のスポットへ → ${nextSpot.name || nextSpot.title || "次へ"}`;
        nextBtn.classList.remove("hidden");
      }

      document.title = `${name} | ${getCourseTitle(data)}`;
      qs("errorView").classList.add("hidden");
      qs("spotView").classList.remove("hidden");
    }

    async function init(){
      const spotId = getQuerySpotId();

      if (!spotId) {
        showError("URLにスポットIDが指定されていません。例: spot.html?id=spot-sazaedo");
        return;
      }

      try {
        const res = await fetch(DATA_URL, { cache: "no-store" });
        if (!res.ok) {
          throw new Error(`JSONの読み込みに失敗しました (${res.status})`);
        }

        const data = await res.json();
        const spots = getAllSpots(data);

        if (!spots.length) {
          showError("course-single.json からスポット一覧を取得できませんでした。JSON構造を確認してください。");
          return;
        }

        showSpot(data, spots, spotId);
      } catch (err) {
        console.error(err);
        showError(`読み込みエラー: ${err.message}`);
      }
    }

    init();
  </script>
</body>
</html>
