<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スポット詳細</title>
  <style>
    :root{
      --bg:#f7f4ee;
      --card:#ffffff;
      --text:#2f2a24;
      --sub:#6b6258;
      --accent:#8b5e3c;
      --accent2:#c89f65;
      --line:#e7dfd4;
      --shadow:0 8px 24px rgba(0,0,0,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.8;
    }

    .wrap{
      max-width:920px;
      margin:0 auto;
      padding:20px 16px 40px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .link{
      color:var(--accent);
      text-decoration:none;
      font-weight:700;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      padding:20px;
      box-shadow:var(--shadow);
      margin-bottom:18px;
    }

    .badge{
      display:inline-block;
      background:#f5eadb;
      color:var(--accent);
      border:1px solid #e9d5b8;
      border-radius:999px;
      padding:6px 12px;
      font-size:.92rem;
      font-weight:700;
      margin-bottom:10px;
    }

    .spot-image-wrap{
      margin:16px 0 18px;
      border-radius:18px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#ece6de;
    }

    .spot-image{
      display:block;
      width:100%;
      height:auto;
      aspect-ratio:16/9;
      object-fit:cover;
      background:#ddd;
    }

    .meta{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin:14px 0 16px;
    }

    .meta .item{
      background:#faf7f2;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      text-align:center;
    }

    .meta .label{
      display:block;
      color:var(--sub);
      font-size:.9rem;
    }

    .meta .value{
      display:block;
      margin-top:4px;
      font-weight:700;
    }

    .mission{
      background:#fcfaf7;
      border:1px dashed #d9c7b1;
      border-radius:16px;
      padding:16px;
    }

    .btns{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:18px;
    }

    .btn{
      display:inline-block;
      text-decoration:none;
      border-radius:999px;
      padding:14px 20px;
      font-weight:700;
      border:1px solid var(--accent);
      transition:.2s;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn-primary{
      background:var(--accent);
      color:#fff;
    }

    .btn-secondary{
      background:#fff;
      color:var(--accent);
    }

    .loading,.error{
      text-align:center;
      padding:40px 20px;
      color:var(--sub);
    }

    .small{
      color:var(--sub);
      font-size:.95rem;
    }

    @media (max-width:640px){
      .meta{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div id="app" class="loading">読み込み中です…</div>
  </main>

  <script>
    async function loadData() {
      const res = await fetch("data/course-single.json");
      if (!res.ok) throw new Error("JSONを読み込めませんでした");
      return res.json();
    }

    function esc(str = "") {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getQueryParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    async function init() {
      const app = document.getElementById("app");

      try {
        const data = await loadData();
        const { site, course, spots, missions = [] } = data;

        const sortedSpots = [...spots].sort((a, b) => a.order - b.order);
        const id = getQueryParam("id") || course.start_spot_id;
        const spot = sortedSpots.find(s => s.id === id);

        if (!spot) {
          throw new Error("該当スポットが見つかりません");
        }

        const mission = missions.find(m => m.spot_id === spot.id);

        const prevHref = spot.prev_spot_id
          ? `spot.html?id=${encodeURIComponent(spot.prev_spot_id)}`
          : "course.html";

        const nextHref = spot.next_spot_id
          ? `spot.html?id=${encodeURIComponent(spot.next_spot_id)}`
          : "complete.html";

        const nextLabel = spot.next_spot_id ? "次の地点へ" : "達成画面へ";

        app.className = "";
        app.innerHTML = `
          <div class="topbar">
            <a class="link" href="course.html">← コースへ戻る</a>
            <div class="small">${spot.order} / ${sortedSpots.length}</div>
          </div>

          <section class="card">
            <div class="badge">スポット ${spot.order}</div>
            <h1 style="margin:.1em 0 .3em">${esc(spot.name)}</h1>
            <div class="small">${esc(spot.short_text || "")}</div>

            <div class="spot-image-wrap">
              <img
                class="spot-image"
                src="${esc(spot.image || "")}"
                alt="${esc(spot.name)}"
                onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=&quot;padding:28px;text-align:center;color:#6b6258&quot;>画像がまだ登録されていません</div>';"
              >
            </div>

            <div class="meta">
              <div class="item">
                <span class="label">順番</span>
                <span class="value">${esc(String(spot.order))}</span>
              </div>
              <div class="item">
                <span class="label">緯度</span>
                <span class="value">${esc(String(spot.lat ?? "-"))}</span>
              </div>
              <div class="item">
                <span class="label">経度</span>
                <span class="value">${esc(String(spot.lng ?? "-"))}</span>
              </div>
            </div>

            <p>${esc(spot.description || "")}</p>

            ${
              spot.lat && spot.lng
                ? `
                  <div class="btns">
                    <a
                      class="btn btn-secondary"
                      href="https://maps.google.com/?q=${encodeURIComponent(spot.lat + ',' + spot.lng)}"
                      target="_blank"
                      rel="noopener noreferrer"
                    >
                      Googleマップで開く
                    </a>
                  </div>
                `
                : ""
            }
          </section>

          ${
            mission
              ? `
                <section class="card">
                  <h2 style="margin-top:0">この地点のミッション</h2>
                  <div class="mission">
                    <div style="font-weight:700; margin-bottom:8px;">
                      ${esc(mission.type === "quiz" ? "クイズ" : "ミッション")}
                    </div>
                    <div>${esc(mission.question || "")}</div>

                    ${
                      Array.isArray(mission.choices) && mission.choices.length
                        ? `
                          <ul style="margin:10px 0 0; padding-left:1.2em;">
                            ${mission.choices.map(choice => `<li>${esc(choice)}</li>`).join("")}
                          </ul>
                        `
                        : ""
                    }
                  </div>
                </section>
              `
              : ""
          }

          <section class="card">
            <div class="btns">
              <a class="btn btn-secondary" href="${prevHref}">
                ${spot.prev_spot_id ? "前の地点へ" : "コースへ戻る"}
              </a>
              <a class="btn btn-primary" href="${nextHref}">
                ${nextLabel}
              </a>
            </div>
          </section>
        `;

        document.title = `${spot.name} | ${course.title} | ${site.site_name}`;
      } catch (err) {
        app.className = "error";
        app.innerHTML = `表示できませんでした。<br>${esc(err.message)}`;
      }
    }

    init();
  </script>
</body>
</html>
